<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Operator Console{% endblock %} — Secure Agentic AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7; color: #1d1d1f; line-height: 1.5; padding: 2rem;
    }
    nav { margin-bottom: 2rem; display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: #0066cc; text-decoration: none; font-weight: 500; }
    nav a:hover { text-decoration: underline; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #1d1d1f; }
    h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    th, td { text-align: left; padding: .75rem 1rem; border-bottom: 1px solid #e5e5ea; }
    th { background: #f2f2f7; font-weight: 600; font-size: .85rem; text-transform: uppercase; letter-spacing: .03em; color: #6c6c70; }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block; padding: .2rem .6rem; border-radius: 4px;
      font-size: .8rem; font-weight: 500;
    }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-approved { background: #d4edda; color: #155724; }
    .badge-rejected { background: #f8d7da; color: #721c24; }
    .badge-executed { background: #cce5ff; color: #004085; }
    .badge-allowed { background: #d4edda; color: #155724; }
    .badge-denied { background: #f8d7da; color: #721c24; }
    .btn {
      display: inline-block; padding: .4rem 1rem; border-radius: 6px;
      font-size: .85rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none;
    }
    .btn-approve { background: #34c759; color: #fff; }
    .btn-approve:hover { background: #28a745; }
    .btn-reject { background: #ff3b30; color: #fff; }
    .btn-reject:hover { background: #dc3545; }
    .btn-small { padding: .25rem .6rem; font-size: .8rem; }
    .empty { text-align: center; padding: 3rem; color: #8e8e93; }
    .flash { padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
    .flash-success { background: #d4edda; color: #155724; }
    .flash-error { background: #f8d7da; color: #721c24; }
    .meta { color: #6c6c70; font-size: .85rem; }
    .actions { display: flex; gap: .5rem; }
    pre { background: #1d1d1f; color: #f5f5f7; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: .85rem; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Secure Agentic AI</span>
    <a href="/operator/">Dashboard</a>
    <a href="/operator/approvals">Pending Approvals</a>
    <a href="/operator/audit">Audit Trail</a>
  </nav>

  {% if flash %}
  <div class="flash flash-{{ flash.type }}">{{ flash.message }}</div>
  {% endif %}

  {% block content %}{% endblock %}
</body>
</html>
